[project]
name = "technical-documentation-suite"
version = "0.1.0"
description = "Advanced multi-agent orchestration for automated technical documentation generation. Demonstrates production-ready patterns for coordinating specialized AI agents with persistent state management."
authors = [
    { name = "Technical Documentation Suite Team", email = "tech-docs@example.com" },
]
license = "Apache License 2.0"
readme = "README.md"
requires-python = ">=3.11"

[tool.poetry.dependencies]
google-cloud-aiplatform = { extras = [
    "adk",
    "agent-engines",
], version = "^1.93.0" }
python = "^3.11"
pydantic = "^2.10.6"
python-dotenv = "^1.0.1"
google-genai = "^1.16.1"
google-adk = "^1.0.0"
fastapi = "^0.104.0"
uvicorn = { extras = ["standard"], version = "^0.24.0" }
aiofiles = "^23.2.1"

[tool.poetry.group.dev]
optional = true

[tool.poetry.group.dev.dependencies]
pytest = "^8.3.5"
google-adk = { version = "^1.0.0", extras = ["eval"] }
pytest-asyncio = "^0.26.0"
pytest-cov = "^4.1.0"

[tool.poetry.group.deployment]
optional = true

[tool.poetry.group.deployment.dependencies]
absl-py = "^2.2.1"
cloudpickle = "^3.1.1"
flake8-pyproject = "^1.2.3"

[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api" 