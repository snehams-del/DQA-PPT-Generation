[project]
name = "security-audit-helper"
version = "0.1.0"
description = "An agent that helps perform security audits"
requires-python = ">=3.12"
dependencies = [
    "google-adk>=1.31.0",
]

[tool.agent-starter-pack]
example_question = "Scan for vulnerabilities."

[tool.agent-starter-pack.settings]
agent_directory = "security_audit_helper"
deployment_targets = ["cloud_run"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
