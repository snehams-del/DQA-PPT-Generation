sources:
  cymbal-flights-dataset:
    kind: postgres
    host: 127.0.0.1
    port: 5432
    database: flights_dataset
    user: postgres
    password: dsagent-alloydb
    #kind: alloydb-postgres
    #project: dsagent-alloydb
    #region: us-central1
    #cluster: dsagent-cluster
    #instance: primary-instance
    #ipType: private
tools:
  find-flights-by-airline-and-number:
    kind: postgres-sql
    source: cymbal-flights-dataset
    statement: |
      SELECT * FROM flights
      WHERE flight_airline = $1
      AND flight_number = $2
      LIMIT 10
    description: |
      Use this tool to get information for a specific flight.
      Takes an airline code and flight number and returns info on the flight.
      Do NOT use this tool with a flight id. Do NOT guess an airline code or flight number.
      A airline code is a code for an airline service consisting of two-character
      airline designator and followed by flight number, which is 1 to 4 digit number.
      For example, if given CY 0123, the airline is "CY", and flight_number is "123".
      Another example for this is DL 1234, the airline is "DL", and flight_number is "1234".
      If the tool returns more than one option choose the date closes to today.
      Example:
      {{
          "airline": "CY",
          "flight_number": "888",
      }}
      Example:
      {{
          "airline": "DL",
          "flight_number": "1234",
      }}
    parameters:
      - name: airline
        type: string
        description: Airline unique 2 letter identifier
      - name: flight_number
        type: string
        description: 1 to 4 digit number
  list-table:
    kind: postgres-sql
    source: cymbal-flights-dataset
    statement: |
      SELECT * FROM {{.tableName}} LIMIT {{.resultLimit}}
    description: |
      Use this tool to list information from a specific table.
      Example:
      {{
          "tableName": "flights",
          "resultLimit": "100"
      }}
    templateParameters:
      - name: tableName
        type: string
        description: Table to select from
      - name: resultLimit
        type: integer
        description: Number of results to return
  execute-sql-tool:
    kind: postgres-execute-sql
    source: cymbal-flights-dataset
    description: Use this tool to execute a SQL statement.
toolsets:
  cymbal-flights-alloydb-toolset:
    - find-flights-by-airline-and-number
    - list-table
    - execute-sql-tool
