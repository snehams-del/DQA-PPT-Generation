[project]
name = "retention-bot"
version = "0.1.0"
description = "An AI agent to identify stale BigQuery datasets and execute Dataplex archival workflows."
requires-python = ">=3.10,<3.13"
#readme = "README.md"
authors = [
    {name = "Imran Khan", email = "mohdik@google.com"},
]
keywords = ["retention", "google-cloud", "bigquery", "dataplex", "ai-agent", "governance"]
dependencies = [
    "google-adk==1.23.0",
    "google-cloud-dataplex==2.16.0",
    "google-cloud-bigquery==3.34.0",
    "google-cloud-resource-manager==1.14.2",
    "google-cloud-aiplatform==1.136.0",
    "google-auth==2.48.0",
    "requests==2.32.5",
    "tabulate==0.9.0",
    "google-adk[eval]"
]

[dependency-groups]
dev = [
    "pytest>=8.3.4,<9.0.0",
    "pytest-asyncio>=0.23.8,<1.0.0",
    "nest-asyncio>=1.6.0,<2.0.0"
]

lint = [
    "ruff>=0.4.6,<1.0.0",
    "mypy>=1.15.0,<2.0.0",
    "codespell>=2.2.0,<3.0.0",
    "types-pyyaml>=6.0.12.20240917,<7.0.0",
    "types-requests>=2.32.0.20240914,<3.0.0",
]

[tool.ruff]
extend = "../../../pyproject.toml"

[tool.ruff.lint]
ignore = ["C901", "PLR0911", "PLR0912", "PLR0915"]


[tool.ruff.lint.isort]
known-first-party = ["retention_bot_agent"]

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "asyncio: mark a test as asyncio.",
]

[tool.agent-starter-pack]
example_question = "List datasets out of retention period."

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["retention_bot_agent"]
