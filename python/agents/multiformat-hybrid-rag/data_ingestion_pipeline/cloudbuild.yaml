# Cloud Build configuration for the KFP pipeline container image.
#
# Builds the Docker image using data_ingestion_pipeline/Dockerfile and pushes it
# to Artifact Registry. The build context is the repo root (.) so that
# COPY commands in the Dockerfile can access pipeline/, app/, etc.
#
# Usage:
#   gcloud builds submit --config=data_ingestion_pipeline/cloudbuild.yaml \
#     --substitutions=_IMAGE="$PIPELINE_IMAGE" --project="$PROJECT_ID" .
#
# The _IMAGE substitution variable is the full Artifact Registry path:
#   ${REGION}-docker.pkg.dev/${PROJECT_ID}/${PROJECT_NAME}-pipeline/data-pipeline:latest
#
# The `images` field tells Cloud Build to push the built image to the
# registry after a successful build — no separate docker push needed.

steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'data_ingestion_pipeline/Dockerfile'  # Dockerfile path relative to build context
      - '-t'
      - '${_IMAGE}'                  # Tag with full AR path from substitution
      - '.'                          # Build context = repo root
images:
  - '${_IMAGE}'
