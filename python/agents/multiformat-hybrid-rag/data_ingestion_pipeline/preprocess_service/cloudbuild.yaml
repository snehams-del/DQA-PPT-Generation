# Cloud Build configuration for the preprocessing Cloud Run service.
#
# Builds the Docker image with LibreOffice + pipeline/ package and pushes
# it to Artifact Registry. Uses the same AR repository as the KFP pipeline
# image but with a different image name (preprocess-service vs data-pipeline).
#
# Usage:
#   gcloud builds submit \
#     --config=data_ingestion_pipeline/preprocess_service/cloudbuild.yaml \
#     --substitutions=_IMAGE="$PREPROCESS_SERVICE_IMAGE" \
#     --project="$PROJECT_ID" .

steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'data_ingestion_pipeline/preprocess_service/Dockerfile'
      - '-t'
      - '${_IMAGE}'
      - '.'
images:
  - '${_IMAGE}'
