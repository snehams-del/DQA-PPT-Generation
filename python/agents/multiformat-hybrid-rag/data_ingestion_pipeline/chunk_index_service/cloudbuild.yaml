# Cloud Build configuration for the chunk-and-index Cloud Run service.
#
# Usage:
#   gcloud builds submit \
#     --config=data_ingestion_pipeline/chunk_index_service/cloudbuild.yaml \
#     --substitutions=_IMAGE="$CHUNK_INDEX_SERVICE_IMAGE" \
#     --project="$PROJECT_ID" .

steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'data_ingestion_pipeline/chunk_index_service/Dockerfile'
      - '-t'
      - '${_IMAGE}'
      - '.'
images:
  - '${_IMAGE}'
