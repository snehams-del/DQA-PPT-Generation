[pytest]
# Only look for tests in the tests directory
testpaths = tests

# Test file patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Ignore these directories when collecting tests
norecursedirs = refs .git __pycache__ .pytest_cache node_modules .venv venv

# Asyncio configuration
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Verbosity and output
addopts = --tb=short --strict-markers

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::pydantic.warnings.PydanticDeprecatedSince20

# Markers
markers =
    asyncio: mark test as async
    unit: mark test as unit test
    integration: mark test as integration test
    requires_vertex_ai: Tests that require Vertex AI (skip in CI)
    ci_safe: Tests safe to run in CI without Vertex AI
    slow: Slow running tests
