# Staging Release Pipeline — Triggered by git tag push (v*.*.*-rc.*)
#
# Pre-prod validation gate before cutting a prod release tag.
# Deploys to the staging project (your-project-staging) with full traffic (no shadow)
# and runs load tests + post-deploy eval.
#
# Usage:
#   git tag v1.2.0-rc.1 && git push origin v1.2.0-rc.1
#
# If staging eval passes: cut the prod release tag.
#   git tag v1.2.0 && git push origin v1.2.0
#
# Ordering:
#   install-deps
#     ├── lint
#     └── unit-tests
#         └── docker-build
#             └── docker-push
#                 └── deploy-agent-engine  (update-or-create for staging)
#                     └── deploy-cloud-run (100% traffic — staging can absorb full rollout)
#                         └── get-service-url
#                             └── smoke-test
#                                 └── load-test
#                                     └── post-deploy-eval

substitutions:
  _EVAL_PROFILE: "standard"
  _PYTHON_VERSION: "3.11"
  _FIRESTORE_DATABASE: "customer-support-db"
  _GOOGLE_CLOUD_LOCATION: "us-central1"
  _REGION: "us-central1"
  _SERVICE_NAME: "customer-support-app"
  _AR_REPO: "customer-support"
  _STAGING_BUCKET: ""
  _AGENT_ENGINE_RESOURCE_NAME: ""
  _AGENT_ENGINE_DISPLAY_NAME: "customer-support-multiagent-staging"
  _MODEL_ARMOR_ENABLED: "false"
  _MODEL_ARMOR_TEMPLATE_ID: ""
  _EVAL_DATASET: "tests/post_deploy/datasets/post_deploy_cases.json"

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  # ===========================================================================
  # Get project number — $PROJECT_NUMBER is not a Cloud Build built-in.
  # Written to /workspace/project_number.txt for deploy-agent-engine.
  # Runs in parallel from the start.
  # ===========================================================================
  - id: "get-project-number"
    name: "gcr.io/google.com/cloudsdktool/cloud-sdk:slim"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        PROJECT_NUM=$(gcloud projects describe $PROJECT_ID --format='value(projectNumber)')
        echo "Project number: $$PROJECT_NUM"
        echo "$$PROJECT_NUM" > /workspace/project_number.txt
    waitFor: ["-"]

  # ===========================================================================
  # Install dependencies
  # ===========================================================================
  - id: "install-deps"
    name: "python:${_PYTHON_VERSION}-slim"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        pip install uv --quiet &&
        uv sync --frozen --group dev
    waitFor: ["-"]

  # ===========================================================================
  # Lint (parallel with unit-tests)
  # ===========================================================================
  - id: "lint"
    name: "python:${_PYTHON_VERSION}-slim"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        export PATH="/workspace/.venv/bin:$$PATH"
        ruff check customer_support_mas/ --ignore=E501
    waitFor: ["install-deps"]

  # ===========================================================================
  # Unit tests at standard profile (parallel with lint)
  # ===========================================================================
  - id: "unit-tests"
    name: "python:${_PYTHON_VERSION}-slim"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        export PATH="/workspace/.venv/bin:$$PATH"
        pytest tests/unit/test_tools.py tests/unit/test_mock_rag.py \
               tests/unit/test_refund_standalone.py \
               tests/unit/test_agent_eval_ci.py -v --tb=short
    env:
      - "GOOGLE_CLOUD_PROJECT=$PROJECT_ID"
      - "GOOGLE_CLOUD_LOCATION=${_GOOGLE_CLOUD_LOCATION}"
      - "FIRESTORE_DATABASE=${_FIRESTORE_DATABASE}"
      - "GOOGLE_GENAI_USE_VERTEXAI=True"
      - "EVAL_PROFILE=${_EVAL_PROFILE}"
    waitFor: ["install-deps"]

  # ===========================================================================
  # Integration tests — multi-agent orchestration, standard profile
  # Staging is the last pre-prod gate — must pass before Docker build.
  # ===========================================================================
  - id: "integration-tests"
    name: "python:${_PYTHON_VERSION}-slim"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        export PATH="/workspace/.venv/bin:$$PATH"
        pytest tests/integration/test_integration_eval_ci.py -v --tb=short
    env:
      - "GOOGLE_CLOUD_PROJECT=$PROJECT_ID"
      - "GOOGLE_CLOUD_LOCATION=${_GOOGLE_CLOUD_LOCATION}"
      - "FIRESTORE_DATABASE=${_FIRESTORE_DATABASE}"
      - "GOOGLE_GENAI_USE_VERTEXAI=True"
      - "EVAL_PROFILE=${_EVAL_PROFILE}"
    waitFor: ["unit-tests"]

  # ===========================================================================
  # Build Docker image — tag with $TAG_NAME, $COMMIT_SHA, and latest
  # ===========================================================================
  - id: "docker-build"
    name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE_NAME}:$TAG_NAME"
      - "-t"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE_NAME}:$COMMIT_SHA"
      - "-t"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE_NAME}:latest"
      - "-f"
      - "backend/Dockerfile"
      - "."
    waitFor: ["lint", "integration-tests"]

  # ===========================================================================
  # Push all tags to Artifact Registry
  # ===========================================================================
  - id: "docker-push"
    name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "--all-tags"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE_NAME}"
    waitFor: ["docker-build"]

  # ===========================================================================
  # Deploy Agent Engine (update-or-create for staging)
  # ===========================================================================
  - id: "deploy-agent-engine"
    name: "python:${_PYTHON_VERSION}-slim"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        export PATH="/workspace/.venv/bin:$$PATH"
        export PROJECT_NUMBER=$(cat /workspace/project_number.txt)
        python deployment/deploy.py --action deploy
    env:
      - "GOOGLE_CLOUD_PROJECT=$PROJECT_ID"
      - "GOOGLE_CLOUD_LOCATION=${_REGION}"
      - "FIRESTORE_DATABASE=${_FIRESTORE_DATABASE}"
      - "GOOGLE_CLOUD_STORAGE_BUCKET=${_STAGING_BUCKET}"
      - "AGENT_ENGINE_DISPLAY_NAME=${_AGENT_ENGINE_DISPLAY_NAME}"
      - "MODEL_ARMOR_ENABLED=${_MODEL_ARMOR_ENABLED}"
      - "MODEL_ARMOR_TEMPLATE_ID=${_MODEL_ARMOR_TEMPLATE_ID}"
    waitFor: ["docker-push", "get-project-number"]

  # ===========================================================================
  # Deploy Cloud Run with 100% traffic (staging absorbs full rollout)
  # ===========================================================================
  - id: "deploy-cloud-run"
    name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        if [ -f /workspace/agent_engine_resource_name.txt ]; then
          RESOURCE_NAME=$(cat /workspace/agent_engine_resource_name.txt)
        else
          RESOURCE_NAME="${_AGENT_ENGINE_RESOURCE_NAME}"
        fi
        gcloud run deploy ${_SERVICE_NAME} \
          --image="${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE_NAME}:$TAG_NAME" \
          --region="${_REGION}" \
          --platform=managed \
          --allow-unauthenticated \
          --set-env-vars="GOOGLE_CLOUD_PROJECT=$PROJECT_ID,FIRESTORE_DATABASE=${_FIRESTORE_DATABASE},GOOGLE_CLOUD_LOCATION=${_REGION},GOOGLE_GENAI_USE_VERTEXAI=True,ENVIRONMENT=production,AGENT_ENGINE_RESOURCE_NAME=$$RESOURCE_NAME,MODEL_ARMOR_ENABLED=${_MODEL_ARMOR_ENABLED},MODEL_ARMOR_TEMPLATE_ID=${_MODEL_ARMOR_TEMPLATE_ID},RELEASE_VERSION=$TAG_NAME" \
          --memory=1Gi \
          --cpu=1 \
          --min-instances=0 \
          --max-instances=10 \
          --port=8080
    waitFor: ["deploy-agent-engine"]

  # ===========================================================================
  # Get deployed Cloud Run URL
  # ===========================================================================
  - id: "get-service-url"
    name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        gcloud run services describe ${_SERVICE_NAME} \
          --region="${_REGION}" \
          --project="$PROJECT_ID" \
          --format="value(status.url)" > /workspace/service_url.txt
        echo "Service URL: $(cat /workspace/service_url.txt)"
    waitFor: ["deploy-cloud-run"]

  # ===========================================================================
  # Smoke tests
  # ===========================================================================
  - id: "smoke-test"
    name: "python:${_PYTHON_VERSION}-slim"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        export PATH="/workspace/.venv/bin:$$PATH"
        SERVICE_URL=$(cat /workspace/service_url.txt)
        echo "Smoke testing: $$SERVICE_URL"
        CLOUD_RUN_URL=$$SERVICE_URL pytest tests/smoke/ -v --tb=short
    waitFor: ["get-service-url"]

  # ===========================================================================
  # Load tests — staging only, 5 users, 2 min, /health endpoint SLO check
  # ===========================================================================
  - id: "load-test"
    name: "python:${_PYTHON_VERSION}-slim"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        pip install uv --quiet && uv sync --frozen --group load-test --quiet
        export PATH="/workspace/.venv/bin:$$PATH"
        SERVICE_URL=$(cat /workspace/service_url.txt)
        echo "Running load tests against: $$SERVICE_URL"
        locust -f tests/load/locustfile.py \
          --headless \
          --users 5 \
          --spawn-rate 1 \
          --run-time 2m \
          --host $$SERVICE_URL \
          --csv /workspace/load-results \
          --exit-code-on-error 1
        python tests/load/check_slos.py /workspace/load-results_stats.csv
    waitFor: ["smoke-test"]

  # ===========================================================================
  # Post-deploy eval against staging Agent Engine
  # Pass: cut the prod tag. Fail: fix before tagging prod.
  # ===========================================================================
  - id: "post-deploy-eval"
    name: "python:${_PYTHON_VERSION}-slim"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        export PATH="/workspace/.venv/bin:$$PATH"
        RESOURCE=$(cat /workspace/agent_engine_resource_name.txt 2>/dev/null || echo "${_AGENT_ENGINE_RESOURCE_NAME}")
        ENGINE_ID=$(echo "$$RESOURCE" | awk -F'/' '{print $$NF}')
        echo "Evaluating staging Agent Engine ID: $$ENGINE_ID"
        python tests/eval_vertex.py \
          --agent-engine-id $$ENGINE_ID \
          --profile ${_EVAL_PROFILE} \
          --dataset "${_EVAL_DATASET}" \
          --custom-inference \
          --output /workspace/eval_scores.json \
          --delay 5
    env:
      - "GOOGLE_CLOUD_PROJECT=$PROJECT_ID"
      - "GOOGLE_CLOUD_LOCATION=${_GOOGLE_CLOUD_LOCATION}"
      - "FIRESTORE_DATABASE=${_FIRESTORE_DATABASE}"
      - "GOOGLE_CLOUD_STORAGE_BUCKET=${_STAGING_BUCKET}"
      - "GOOGLE_GENAI_USE_VERTEXAI=True"
    waitFor: ["load-test"]

images:
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE_NAME}:$TAG_NAME"
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE_NAME}:$COMMIT_SHA"
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE_NAME}:latest"

timeout: "5400s"  # 90 min: CI + docker + agent engine + load tests + eval
