[project]
name = "retail-skills-recipe"
version = "0.1.0"
description = "Production-ready AI agent skills for retail on Google Cloud: semantic product search, virtual try-on, recommendations, and content generation"
authors = [
    { name = "Google LLC" },
]
license = { text = "Apache-2.0" }
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    # ADK & Agent infrastructure
    "google-adk>=1.15.0,<2.0.0",
    # Google AI
    "google-genai>=1.0",
    "google-auth>=2.0",
    # GCP services
    "google-cloud-bigquery>=3.0",
    "google-cloud-storage>=2.0",
    "google-cloud-aiplatform>=1.30",
    "google-cloud-pubsub>=2.0",
    # Utilities
    "pyyaml>=6.0",
    "requests>=2.28",
    # FastAPI for serving
    "fastapi>=0.115.8,<1.0.0",
    "uvicorn[standard]>=0.34.0",
    "protobuf>=5.0,<7.0.0",
]

[project.optional-dependencies]
tryon = [
    "google-genai>=1.0",
    "google-cloud-storage>=2.0",
]
search = [
    "google-cloud-vectorsearch>=0.5,<1.0",
]
voice = [
    "pyaudio>=0.2.14",
]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-mock>=3.14",
    "pytest-cov>=4.1",
    "pytest-asyncio>=0.23.7",
    "ruff>=0.4.6",
]

[[tool.uv.index]]
url = "https://pypi.org/simple"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["samples"]

[tool.pytest.ini_options]
testpaths = ["samples"]
addopts = "-s -v"
log_cli = true
log_cli_level = "INFO"

[tool.ruff]
line-length = 88
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP", "RUF"]
ignore = ["E501", "C901", "B006"]

[tool.agent-starter-pack]
base_template = "adk_base"
description = "Production-ready AI agent skills for retail: semantic product search, virtual try-on, recommendations, and content generation"
example_question = "I want to build a product search agent for my e-commerce site"

[tool.agent-starter-pack.settings]
name = "retail-skills-recipe"
description = "Retail agent skills recipe with four layered capabilities"
base_template = "adk"
agent_directory = "samples/retail-product-search/app"
deployment_targets = ["cloud_run"]
