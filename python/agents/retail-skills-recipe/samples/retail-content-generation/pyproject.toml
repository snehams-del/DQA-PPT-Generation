[project]
name = "retail-content-generation"
version = "0.1.0"
description = "Product content generation agent using Gemini"
requires-python = ">=3.10"
license = {text = "Apache-2.0"}

dependencies = [
    "google-cloud-bigquery>=3.0",
    "google-genai>=1.0",
    "pyyaml>=6.0",
]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-mock>=3.14",
    "pytest-cov>=4.1",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-s -v"
log_cli = true
log_cli_level = "INFO"
